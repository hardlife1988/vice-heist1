kind = "web"
previewPath = "/"
title = "Vice Heist Slot Game"
version = "1.0.0"
id = "artifacts/vice-heist"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20007

[services.development]
run = "pnpm --filter @workspace/vice-heist run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vice-heist", "run", "build" ]
serve = "static"
publicDir = "artifacts/vice-heist/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20007"
BASE_PATH = "/"
